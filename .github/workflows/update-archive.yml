name: Update Archive

on:
  schedule:
    # ~8am America/Los_Angeles. GitHub Actions cron is always UTC and does NOT
    # observe daylight saving. We avoid the congested ':00' minute (where GitHub
    # most often drops scheduled runs) and add a backup slot ~1h later. The
    # capture is idempotent — re-running just rewrites the same day's file — so
    # two runs a day is harmless and means a dropped first run still gets caught.
    #   15:17 UTC = 8:17am PDT (summer) / 7:17am PST (winter)
    #   16:17 UTC = backup
    - cron: '17 15 * * *'
    - cron: '17 16 * * *'
  workflow_dispatch:
    inputs:
      date:
        description: 'Capture a specific day (YYYY-MM-DD). Default: yesterday in Pacific time.'
        required: false

# Avoid overlapping runs (e.g. a manual run during the scheduled one).
concurrency:
  group: update-archive
  cancel-in-progress: false

jobs:
  capture:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # capture-digest.mjs pulls the upstream central feed via prepare-digest.js
      # (no API keys needed) and writes the dated archive JSON, manifest, and
      # search index. It uses only Node built-ins, so no npm install is required.
      - name: Capture digest into archive
        env:
          FOLLOW_BUILDERS_SKILL_DIR: ${{ github.workspace }}
        run: |
          cd apps/ai-builder-archive
          if [ -n "${{ inputs.date }}" ]; then
            node scripts/capture-digest.mjs --date="${{ inputs.date }}"
          else
            node scripts/capture-digest.mjs
          fi

      - name: Commit and push archive updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps/ai-builder-archive/public/archive
          git diff --cached --quiet || git commit -m "chore: update archive [skip ci]"
          git push
