name: Update Archive

on:
  schedule:
    # GitHub's scheduled trigger is best-effort: it gets delayed by hours and is
    # frequently dropped entirely (worst at the top of the hour, and more so on
    # forks). Mitigation per GitHub's own guidance: use off-peak minutes and fire
    # several times across the morning so a dropped slot is backed up by the next.
    # The capture is idempotent (it just rewrites yesterday's file), so running
    # multiple times a day is harmless — yesterday's content is available all
    # morning regardless of which slot actually lands.
    # Times below are UTC (cron has no DST). PDT = UTC-7, PST = UTC-8.
    - cron: '9 13 * * *'   # 06:09 PDT
    - cron: '9 15 * * *'   # 08:09 PDT
    - cron: '9 17 * * *'   # 10:09 PDT
    - cron: '9 19 * * *'   # 12:09 PDT
  workflow_dispatch:
    inputs:
      date:
        description: 'Capture a specific day (YYYY-MM-DD). Default: yesterday in Pacific time.'
        required: false

# Avoid overlapping runs (e.g. a manual run during the scheduled one).
concurrency:
  group: update-archive
  cancel-in-progress: false

jobs:
  capture:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # capture-digest.mjs pulls the upstream central feed via prepare-digest.js
      # (no API keys needed) and writes the dated archive JSON, manifest, and
      # search index. It uses only Node built-ins, so no npm install is required.
      - name: Capture digest into archive
        env:
          FOLLOW_BUILDERS_SKILL_DIR: ${{ github.workspace }}
        run: |
          cd apps/ai-builder-archive
          if [ -n "${{ inputs.date }}" ]; then
            node scripts/capture-digest.mjs --date="${{ inputs.date }}"
          else
            node scripts/capture-digest.mjs
          fi

      - name: Commit and push archive updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps/ai-builder-archive/public/archive
          git diff --cached --quiet || git commit -m "chore: update archive [skip ci]"
          git push
